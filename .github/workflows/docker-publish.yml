name: Build & Push SharkShell

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: greatsharktech/sharkshell
  GHCR_IMAGE: ghcr.io/sushilkumarsahani41/sharkshell

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sharkshell
          cache-to: type=gha,mode=max,scope=sharkshell

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 🦈 SharkShell

            **Zero-config deploy:**
            ```bash
            docker run -d -p 8080:80 greatsharktech/sharkshell:latest
            ```

            **With your own database:**
            ```bash
            docker run -d -p 8080:80 \
              -e DB_HOST=your_db_host \
              -e DB_USER=your_db_user \
              -e DB_PASSWORD=your_db_pass \
              -e DB_NAME=sharkshell \
              greatsharktech/sharkshell:latest
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
