# ─────────────────────────────────────────────
# SharkShell — Production Docker Stack
#
# Quick Start:
#   ./init.sh && docker compose -f docker-compose.prod.yml up -d
#
# With your own database:
#   Set DB_HOST, DB_USER, DB_PASSWORD, DB_NAME in .env
#   The 'postgres' service will be skipped automatically if using external DB
# ─────────────────────────────────────────────

services:
  # ─── PostgreSQL ───
  # Skipped automatically if using an external database (managed by init.sh profiles)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles:
      - db
    environment:
      POSTGRES_USER: ${DB_USER:-sharkshell}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Run ./init.sh first}
      POSTGRES_DB: ${DB_NAME:-sharkshell}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-sharkshell}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Backend (API + SSH Proxy) ───
  backend:
    image: greatsharktech/sharkshell-backend:latest
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3002}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-sharkshell}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-sharkshell}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
    volumes:
      - secrets:/app/secrets

  # ─── SharkShell (Frontend + Reverse Proxy) ───
  sharkshell:
    image: greatsharktech/sharkshell:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${COMPOSE_PORT:-8080}:80"

volumes:
  pgdata:
    driver: local
  secrets:
    driver: local
