services:
  # ─── PostgreSQL ───
  # Comment out this entire block if using an external database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-sharkshell}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required. Run ./init.sh first}
      POSTGRES_DB: ${DB_NAME:-sharkshell}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-sharkshell}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Backend (Nest.js) ───
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3002}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-sharkshell}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-sharkshell}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
    volumes:
      - secrets:/app/secrets
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:${PORT:-3002}/api" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Frontend (Nginx) ───
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${COMPOSE_PORT:-8080}:80"

volumes:
  pgdata:
    driver: local
  secrets:
    driver: local
